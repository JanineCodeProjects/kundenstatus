<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kundenstatus</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 3rem 4rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 0.5rem; }
    p { color: #94a3b8; margin: 0; }
    .status { color: #4ade80; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kundenstatus</h1>
    <p>Deine App läuft <span class="status">online</span> auf Railway ✅</p>
  </div>
</body>
</html>
